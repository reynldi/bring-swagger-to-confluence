<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confluence Swagger Renderer Plugin</title>
    <!-- Atlassian Connect JavaScript API -->
    <script src="https://connect-cdn.atl-paas.net/all.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- Fallback content while React loads -->
      <div id="loading-fallback" style="padding: 20px; text-align: center; font-family: Arial, sans-serif;">
        <h2>Loading Swagger Documentation...</h2>
        <div style="margin: 20px 0;">
          <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        </div>
        <p id="debug-info">Initializing React app...</p>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>
    
    <script>
      // Global error handler
      window.addEventListener('error', function(e) {
        console.error('❌ JavaScript Error:', e.error);
        document.getElementById('debug-info').innerHTML = 
          '<strong style="color: red;">Error: ' + e.message + '</strong><br>' +
          'Check console for details';
      });
      
      // Debug info
      console.log('🔧 HTML loaded, React should start soon...');
      console.log('URL:', window.location.href);
      console.log('URL Params:', Object.fromEntries(new URLSearchParams(window.location.search)));
      
      // Initialize Atlassian Connect when DOM is ready
      document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 DOM ready');
        // Signal to Confluence that the app is ready
        if (window.AP && window.AP.resize) {
          console.log('📏 AP.resize available, calling it');
          window.AP.resize();
        } else {
          console.log('⚠️ AP.resize not available yet');
        }
      });
      
      // Handle app ready state
      window.addEventListener('load', function() {
        console.log('🎯 Window loaded');
        if (window.AP && window.AP.resize) {
          // Resize the dialog to fit content
          window.AP.resize();
          
          // Signal that the app has loaded successfully
          if (window.AP.dialog && window.AP.dialog.getButton) {
            // Enable dialog buttons if they exist
            try {
              window.AP.dialog.getButton('submit').enable();
            } catch (e) {
              // Button might not exist, that's okay
            }
          }
        }
        
        // Remove loading fallback after a delay if React hasn't taken over
        setTimeout(function() {
          const fallback = document.getElementById('loading-fallback');
          if (fallback && fallback.parentNode) {
            console.log('⚠️ React app may have failed to load - fallback still visible');
          }
        }, 5000);
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
