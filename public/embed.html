<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swagger Documentation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
        }
        .embed-container {
            width: 100%;
            min-height: 100vh;
            background: #f8fafc;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            gap: 16px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Add Confluence Connect framework
        window.addEventListener('load', function() {
            // Load Atlassian Connect if in Confluence context
            if (window.location.search.includes('xdm_e=') || window.parent !== window) {
                var script = document.createElement('script');
                script.src = 'https://connect-cdn.atl-paas.net/all.js';
                script.onload = function() {
                    console.log('Atlassian Connect loaded');
                };
                document.head.appendChild(script);
            }
        });
    </script>
</head>
<body>
    <div id="root" class="embed-container">
        <div class="loading">
            <div class="spinner"></div>
            <p style="color: #64748b;">Loading Swagger Documentation Editor...</p>
        </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
